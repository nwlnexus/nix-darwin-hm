name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you would like and why it would be useful.

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this feature solve? Who benefits?
      placeholder: As a user of this config, I need to ...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - high
        - medium
        - low
    validations:
      required: true
