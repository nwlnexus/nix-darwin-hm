name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the details below to help us investigate.

  - type: input
    id: title
    attributes:
      label: Title
      description: A short summary of the bug
      placeholder: e.g. darwin-rebuild fails after adding a new home module
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: Describe what went wrong
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform is affected?
      options:
        - aarch64-darwin (Apple Silicon macOS)
        - x86_64-darwin (Intel macOS)
        - x86_64-linux (NixOS)
        - aarch64-linux (NixOS ARM)
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: If applicable, paste relevant build output or logs
    validations:
      required: false
